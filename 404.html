<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pàgina no trobada — Programació Didàctica</title>
<link rel="stylesheet" href="assets/css/tokens.css">
<style>
  body { display: flex; min-height: 100dvh; align-items: center; justify-content: center; }
  .box { text-align: center; padding: 40px 28px; max-width: 460px; }
  .box h1 { font-size: 64px; color: var(--blue); line-height: 1; margin-bottom: 8px; }
  .box h2 { font-size: 20px; color: var(--navy); margin-bottom: 14px; }
  .box p { color: var(--muted); line-height: 1.55; margin-bottom: 22px; }
  .home {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 22px; font-weight: 700;
    background: var(--blue); color: #fff;
  }
  .home:hover { background: var(--navy); text-decoration: none; }
</style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <h2>Aquesta pàgina no existeix</h2>
    <p>El document que busques no s\u2019ha trobat. Potser l\u2019enllaç és antic o el material encara no s\u2019ha publicat.</p>
    <a class="home" href="/index.html">Torna a l\u2019inici</a>
  </div>
</body>
</html>
