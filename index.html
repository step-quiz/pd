<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matemàtiques Aplicades I — 1r Batxillerat PRO</title>

<!--
  1r-bat-pro.html — Programació de Matemàtiques Aplicades I (1r Batxillerat Professionalitzador)

  Mostra, en una sola pàgina, el contingut de:
    · 1r-bat-pro-data/1r-batxi-pro-v4.docx   → la programació general (DOCX, via mammoth)
    · 1r-bat-pro-data/Ud1.md … Ud6.md        → les propostes detallades per unitat (Markdown)

  Les unitats es detecten automàticament: la pàgina prova de carregar Ud1…Ud6 i només
  ofereix al menú lateral les que existeixen. Per afegir-ne una de nova, només cal deixar
  el fitxer (p. ex. Ud2.md) dins de 1r-bat-pro-data/ i tornar a carregar la pàgina.

  HTML + CSS + JS vanilla, sense build. Cal servir-lo per HTTP(S) (no file://),
  perquè llegeix els fitxers de dades amb fetch().
-->

<script src="lib/mammoth.browser.min.js"></script>
<style>
/* ── Design tokens (estil del projecte de matemàtiques) ─────────────── */
:root {
  --navy:   #1f3a5f;
  --blue:   #2e75b6;
  --blue-bg:#eaf1fa;
  --ink:    #22262b;
  --muted:  #5f5e5a;
  --hint:   #8a8a85;
  --line:   #dfe3ea;
  --line-2: #eef1f5;
  --bg:     #f4f6f9;
  --card:   #ffffff;
  --surface-2: #fafbfc;
  --accent-soft: rgba(46,117,182,.10);

  --radius:    14px;
  --radius-sm: 9px;
  --sh:    0 1px 2px rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.05);
  --sh-md: 0 4px 16px rgba(0,0,0,.07), 0 2px 6px rgba(0,0,0,.04);
  --ease:  cubic-bezier(.4,0,.2,1);

  /* accents per tipus de document */
  --doc-prog:  #b56010;   /* programació general (DOCX) */
  --doc-ud:    #2e75b6;   /* unitats didàctiques (MD)   */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* Assegura que l'atribut HTML `hidden` sempre oculta l'element,
   independentment de qualsevol regla CSS `display` amb més especificitat. */
[hidden] { display: none !important; }

html, body {
  height: 100%;
  font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  font-size: 16.5px;
  line-height: 1.5;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Shell ──────────────────────────────────────────────────────────── */
.app { min-height: 100dvh; display: flex; flex-direction: column; }

/* ── Topbar ─────────────────────────────────────────────────────────── */
.topbar {
  flex: 0 0 auto;
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px; height: 54px;
  background: rgba(255,255,255,.9);
  backdrop-filter: saturate(180%) blur(18px);
  -webkit-backdrop-filter: saturate(180%) blur(18px);
  border-bottom: 1px solid var(--line);
}
.pill-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 13px; border-radius: 20px;
  border: 1px solid var(--line); font-size: 14px; font-weight: 600;
  color: var(--muted); background: var(--card); transition: .12s;
  white-space: nowrap; text-decoration: none;
}
.pill-btn:hover { border-color: var(--navy); color: var(--navy); text-decoration: none; }
.pill-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.pill-btn.accent { border-color: var(--blue); color: var(--blue); }
.pill-btn.accent:hover { background: var(--blue); color: #fff; }

/* ── Selector de curs (dos botons grans, estil segmentat) ─────────── */
.course-switch {
  display: inline-flex; flex-shrink: 0;
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 22px; padding: 3px; gap: 2px;
}
.course-btn {
  padding: 7px 16px; border-radius: 18px;
  font-size: 14.5px; font-weight: 700; color: var(--muted);
  white-space: nowrap; transition: .14s var(--ease);
}
.course-btn:hover { color: var(--navy); }
.course-btn.active {
  background: var(--blue); color: #fff;
  box-shadow: 0 1px 3px rgba(46,117,182,.35);
}

.brand {
  font-size: 16px; font-weight: 800; color: var(--navy); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-align: right;
}
.brand small { font-weight: 400; color: var(--muted); font-size: 13px; margin-left: 8px; }

/* hamburger (només mòbil) */
.menu-toggle { display: none; }

/* ── Layout: sidebar + contingut ───────────────────────────────────── */
.layout {
  flex: 1 1 auto;
  display: grid;
  grid-template-columns: 260px 1fr;
  align-items: start;   /* perquè la sidebar sticky no s'estiri */
}

/* ── Sidebar ────────────────────────────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--line);
  background: var(--surface-2);
  padding: 16px 12px 60px;
  /* Flotant: es manté visible en fer scroll del contingut.
     54px = alçada de la topbar; la barra té el seu propi scroll intern. */
  position: sticky;
  top: 54px;
  align-self: start;
  height: calc(100dvh - 54px);
  overflow-y: auto;
}
.side-group { margin-bottom: 18px; }
.side-group h3 {
  font-size: 10px; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; color: var(--hint);
  margin: 4px 10px 8px;
}
.nav-item {
  display: flex; align-items: center; gap: 11px;
  width: 100%; text-align: left;
  padding: 9px 11px; margin-bottom: 3px;
  border-radius: var(--radius-sm);
  color: var(--ink); transition: background .12s, color .12s;
  cursor: pointer; line-height: 1.3;
}
.nav-item:hover { background: var(--blue-bg); text-decoration: none; }
.nav-item.active { background: var(--blue); color: #fff; }
.nav-item.active .nav-sub { color: rgba(255,255,255,.82); }
.nav-item.active .nav-badge { background: rgba(255,255,255,.22); color: #fff; }
.nav-ico {
  flex-shrink: 0; width: 30px; height: 30px;
  border-radius: 8px; display: inline-flex;
  align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
}
.nav-ico.prog { color: var(--doc-prog); background: rgba(181,96,16,.10); }
.nav-ico.ud   { color: var(--doc-ud);   background: rgba(46,117,182,.10); }
.nav-item.active .nav-ico { background: rgba(255,255,255,.20); color: #fff; }
.nav-body { flex: 1; min-width: 0; }
.nav-title { font-size: 14.5px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-sub { font-size: 11.5px; color: var(--muted); margin-top: 1px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-badge {
  flex-shrink: 0; font-size: 11px; font-weight: 700;
  color: var(--muted); background: var(--line-2);
  padding: 2px 7px; border-radius: 20px;
}
.nav-empty {
  font-size: 12.5px; color: var(--hint); line-height: 1.5;
  padding: 8px 11px; border: 1px dashed var(--line);
  border-radius: var(--radius-sm); margin-top: 4px;
}

/* ── Main / contingut ───────────────────────────────────────────────── */
.main { min-width: 0; }
.doc-wrap { max-width: 880px; margin: 0 auto; padding: 30px 32px 80px; }

/* capçalera de cada document */
.doc-head {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 24px; padding-bottom: 18px;
  border-bottom: 2px solid var(--line);
}
.doc-head .dh-ico {
  flex-shrink: 0; width: 44px; height: 44px; border-radius: 11px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800;
}
.doc-head .dh-ico.prog { color: var(--doc-prog); background: rgba(181,96,16,.10); }
.doc-head .dh-ico.ud   { color: var(--doc-ud);   background: rgba(46,117,182,.10); }
.doc-head h1 { font-size: 25px; color: var(--navy); line-height: 1.2; }
.doc-head .dh-meta { font-size: 13.5px; color: var(--muted); margin-top: 4px; }
.doc-head .dh-actions { margin-left: auto; display: flex; gap: 8px; flex-shrink: 0; }

/* estats */
.state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; padding: 80px 20px; text-align: center; color: var(--muted);
}
.spinner {
  width: 30px; height: 30px; border-radius: 50%;
  border: 3px solid var(--line); border-top-color: var(--blue);
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state.err { color: #a02848; }
.state.err .state-box {
  background: rgba(160,40,72,.06); border: 1px solid rgba(160,40,72,.18);
  border-radius: var(--radius); padding: 18px 22px; max-width: 520px;
  text-align: left; line-height: 1.55; color: var(--ink); font-size: 14.5px;
}
.state.err code { font-family: ui-monospace, Menlo, Consolas, monospace;
  background: rgba(0,0,0,.05); padding: 1px 5px; border-radius: 5px; font-size: 13px; }

/* ── Contingut renderitzat (DOCX i MD comparteixen .rich) ───────────── */
.rich { color: var(--ink); }
.rich h1, .rich h2, .rich h3, .rich h4 { color: var(--navy); line-height: 1.25; }
.rich h1 { font-size: 23px; margin: 30px 0 12px; }
.rich h2 {
  font-size: 20px; margin: 30px 0 12px;
  padding-bottom: 7px; border-bottom: 1px solid var(--line);
}
.rich h3 { font-size: 17px; margin: 22px 0 8px; }
.rich h4 { font-size: 15px; margin: 18px 0 6px; color: var(--blue); }
.rich p { margin: 0 0 12px; }
.rich ul, .rich ol { margin: 0 0 14px; padding-left: 26px; }
.rich li { margin-bottom: 5px; }
.rich strong { font-weight: 700; color: var(--ink); }
.rich em { font-style: italic; }
.rich a { color: var(--blue); }
.rich hr { border: none; border-top: 1px solid var(--line); margin: 26px 0; }
.rich code {
  font-family: ui-monospace, Menlo, Consolas, monospace; font-size: .9em;
  background: rgba(0,0,0,.05); padding: 1px 5px; border-radius: 5px;
}
.rich blockquote {
  margin: 0 0 14px; padding: 10px 16px;
  background: var(--blue-bg); border-left: 3px solid var(--blue);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0; color: var(--muted);
}
.rich blockquote p:last-child { margin-bottom: 0; }

/* ── Seccions plegables (details/summary) ─────────────────────────── */
.rich .sec {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin: 0 0 12px;
  box-shadow: var(--sh);
  overflow: hidden;
}
.rich .sec > summary {
  display: flex; align-items: center; gap: 11px;
  padding: 14px 18px;
  cursor: pointer; list-style: none;
  font-size: 17px; font-weight: 700; color: var(--navy);
  transition: background .12s;
  user-select: none;
}
.rich .sec > summary::-webkit-details-marker { display: none; }
.rich .sec > summary:hover { background: var(--blue-bg); }
.rich .sec[open] > summary { border-bottom: 1px solid var(--line-2); }
.rich .sec-caret {
  flex-shrink: 0; width: 9px; height: 9px;
  border-right: 2.4px solid var(--blue); border-bottom: 2.4px solid var(--blue);
  transform: rotate(-45deg); transition: transform .18s var(--ease);
  margin-left: 2px;
}
.rich .sec[open] > summary .sec-caret { transform: rotate(45deg); }
.rich .sec-title { flex: 1; min-width: 0; }
.rich .sec-body { padding: 6px 18px 18px; }
.rich .sec-subtitle {
  font-size: 18px; font-weight: 700; color: var(--navy);
  margin: 6px 0 14px;
}
/* subplegables niats (H3 dins d'un bloc) */
.rich .sec .sec.sub {
  border: 1px solid var(--line-2);
  box-shadow: none;
  margin: 12px 0;
  background: var(--surface-2);
}
.rich .sec.sub > summary {
  padding: 11px 15px;
  font-size: 15px; color: var(--blue);
}
.rich .sec.sub > summary:hover { background: rgba(46,117,182,.06); }
.rich .sec.sub .sec-caret { border-color: var(--blue); }
.rich .sec.sub > .sec-body { padding: 4px 15px 14px; }
/* dins d'un bloc plegat, el primer encapçalament no necessita marge superior */
.rich .sec-body > h3:first-child,
.rich .sec-body > h4:first-child { margin-top: 12px; }
/* en imprimir, tot desplegat */
@media print { .rich .sec-body { display: block !important; } }

/* ── Proposta A: format de fitxa per als camps de cada hora ───────── */
.rich .hour-card {
  display: grid; grid-template-columns: 152px 1fr;
  border: 1px solid var(--line-2); border-radius: var(--radius-sm);
  overflow: hidden; margin: 4px 0 18px; font-size: 14.5px;
}
.rich .hour-card .hc-key {
  background: var(--surface-2); padding: 9px 13px;
  font-weight: 700; color: var(--navy);
  border-bottom: 1px solid var(--line-2);
}
.rich .hour-card .hc-val {
  padding: 9px 13px; border-bottom: 1px solid var(--line-2);
  border-left: 1px solid var(--line-2);
}
.rich .hour-card .hc-key:nth-last-child(2),
.rich .hour-card .hc-val:last-child { border-bottom: none; }

.rich .hour-devel { margin: 4px 0 18px; }
.rich .hour-devel .hd-title {
  display: flex; align-items: center; gap: 8px;
  font-weight: 700; color: var(--navy); font-size: 14.5px; margin-bottom: 8px;
}
.rich .hour-devel .hd-bar {
  width: 4px; height: 16px; background: var(--blue);
  border-radius: 2px; flex-shrink: 0;
}
.rich .hour-devel .hd-body p { margin: 0 0 9px; }
.rich .hour-devel .hd-body p:last-child { margin-bottom: 0; }

.rich .hour-foot {
  border-top: 1px solid var(--line-2); padding-top: 12px;
  font-size: 14px;
}
.rich .hour-foot p { margin: 0 0 7px; line-height: 1.5; }
.rich .hour-foot p:last-child { margin-bottom: 0; }
.rich .hour-foot .hf-key { font-weight: 700; color: var(--navy); }

/* ── Panell de material de la sessió (PDF: veure / descarregar) ────── */
.rich .session-pdf {
  display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
  margin: 0 0 16px; padding: 12px 14px;
  background: var(--blue-bg); border: 1px solid var(--line);
  border-radius: var(--radius-sm);
}
.rich .session-pdf .sp-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 13.5px; font-weight: 700; color: var(--navy);
  margin-right: auto;
}
.rich .session-pdf .sp-ico {
  flex-shrink: 0; width: 26px; height: 26px; border-radius: 7px;
  background: #fff; border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; color: #b5341a;
}
.rich .session-pdf a.sp-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: 20px; font-size: 13.5px; font-weight: 600;
  text-decoration: none; transition: .12s; white-space: nowrap;
}
.rich .session-pdf a.sp-view {
  background: var(--blue); color: #fff; border: 1px solid var(--blue);
}
.rich .session-pdf a.sp-view:hover { background: var(--navy); border-color: var(--navy); text-decoration: none; }
.rich .session-pdf a.sp-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.rich .session-pdf.sp-pending { background: var(--surface-2); border-color: var(--line); }
.rich .session-pdf.sp-pending .sp-ico { color: var(--hint); }
.rich .session-pdf.sp-pending .sp-label { color: var(--muted); }
.rich .session-pdf .sp-wip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 13px; border-radius: 20px; font-size: 13.5px; font-weight: 600;
  white-space: nowrap; color: var(--hint);
  background: var(--line-2); border: 1px solid var(--line);
  cursor: default; pointer-events: none;
}

/* taules — clau per a la temporalització i les graelles de sessió */
.rich table {
  width: 100%; border-collapse: collapse; margin: 6px 0 20px;
  font-size: 14.5px; background: var(--blue-bg);
  border: 1px solid var(--line); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--sh);
}
.rich thead th {
  background: var(--blue-bg); color: var(--ink); font-weight: 700;
  text-align: left; padding: 9px 13px; font-size: 13.5px;
  border-bottom: 2px solid var(--blue);
}
.rich tbody td { padding: 9px 13px; border-top: 1px solid var(--line-2); vertical-align: top; color: var(--ink); }
.rich tbody tr:hover { background: var(--accent-soft); }
.rich table p { margin: 0; }
.table-scroll { overflow-x: auto; margin: 6px 0 20px; }
.table-scroll table { margin: 0; }

.rich img { max-width: 100%; height: auto; border-radius: var(--radius-sm); margin: 8px 0; }

/* ── Print ──────────────────────────────────────────────────────────── */
@media print {
  .topbar, .sidebar { display: none !important; }
  .layout { display: block; }
  .main { overflow: visible; }
  .doc-wrap { max-width: none; padding: 0; }
  .rich table { box-shadow: none; }
  .rich thead th { background: #eaf1fa !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* ── Responsiu ──────────────────────────────────────────────────────── */
@media (max-width: 820px) {
  .menu-toggle { display: inline-flex; }
  .layout { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; top: 54px; left: 0; bottom: 0; width: 280px; z-index: 35;
    transform: translateX(-100%); transition: transform .22s var(--ease);
    box-shadow: var(--sh-md);
  }
  .app.nav-open .sidebar { transform: translateX(0); }
  .scrim {
    position: fixed; inset: 54px 0 0 0; background: rgba(0,0,0,.28);
    z-index: 34; opacity: 0; pointer-events: none; transition: opacity .22s;
  }
  .app.nav-open .scrim { opacity: 1; pointer-events: auto; }
  .doc-wrap { padding: 22px 18px 70px; }
  .doc-head .dh-actions { display: none; }
  /* La topbar prioritza els botons de curs: amaguem la marca i el text "Inici"/"Imprimir" */
  .brand { display: none; }
  .topbar .pill-btn:not(.menu-toggle) { font-size: 0; padding: 7px 10px; }
  .topbar .pill-btn:not(.menu-toggle) svg { width: 15px; height: 15px; }
  .course-btn { padding: 7px 12px; font-size: 14px; }
}
@media (min-width: 821px) { .scrim { display: none; } }
</style>
</head>
<body>
<div class="app" id="app">

  <header class="topbar">
    <button class="pill-btn menu-toggle" id="menuToggle" title="Menú">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
    </button>
    <a class="pill-btn" href="index.html">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M10 4l-5 4 5 4"/></svg>
      Inici
    </a>
    <div class="course-switch" id="courseSwitch">
      <button class="course-btn" data-course="1">1r Bat PRO</button>
      <button class="course-btn" data-course="2">2n Bat PRO</button>
    </div>
    <div class="brand" id="brand"></div>
    <button class="pill-btn" onclick="window.print()" title="Imprimeix el document actual">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="10" height="6" rx="1"/><path d="M5 7V3.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 .5.5V7M5 13v-2h6v2"/></svg>
      Imprimir
    </button>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main">
      <div class="state"><div class="spinner"></div><div>Carregant…</div></div>
    </main>
  </div>

  <div class="scrim" id="scrim"></div>
</div>

<script>
/* ─── CONFIG ──────────────────────────────────────────────────────────
   Dos cursos. Cada curs té la seva carpeta de dades, la seva programació
   (DOCX) i els seus títols d'unitats. Els fitxers segueixen la convenció:
     · {dir}/Ud{n}.md                 (proposta detallada de la unitat n)
     · {dir}/1bat-ud{n}-{s}.pdf        (material de la sessió s de la unitat n)
   Per al 2n curs, la convenció anàloga és 2bat-ud{n}-{s}.pdf.
   Quan es creïn els fitxers del 2n curs, apareixeran automàticament. */
const COURSES = {
  '1': {
    label: '1r Bat PRO',
    dir: '1r-bat-pro-data',
    pdfPrefix: '1bat',
    brand: 'Matemàtiques Aplicades I',
    brandSub: '1r Batxillerat PRO · Serveis a la Comunitat',
    udTitles: {
      1: 'Nombres reals, inequacions i intervals',
      2: 'Llenguatge algebraic i polinomis',
      3: 'Funcions i modelització social',
      4: 'Estadística i dades socioeconòmiques',
      5: 'Aritmètica aplicada i economia social',
      6: 'Probabilitat i presa de decisions',
    },
  },
  '2': {
    label: '2n Bat PRO',
    dir: '2n-bat-pro-data',
    pdfPrefix: '2bat',
    brand: 'Matemàtiques Aplicades II',
    brandSub: '2n Batxillerat PRO · Serveis a la Comunitat',
    udTitles: {
      1: 'Matrices: organitzar i operar amb dades',
      2: 'Programació lineal: decidir amb recursos limitats',
      3: 'Límits i continuïtat: tendències i llindars',
      4: 'Derivades i optimització',
      5: 'Probabilitat i distribucions',
      6: 'Inferència estadística',
    },
  },
};

const UD_MAX = 6;

/* Curs actiu (per defecte, 1r). DATA_DIR i companyia en deriven. */
let currentCourse = '1';
function course() { return COURSES[currentCourse]; }

/* ─── STATE ───────────────────────────────────────────────────────── */
let DOCS = [];          // [{id, kind, file, title, sub}]
let activeId = null;
const cache = {};       // id → html ja renderitzat

/* ─── UTILITATS ───────────────────────────────────────────────────── */
function escHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* Comprova si un fitxer existeix (HEAD; fallback a GET si el servidor no admet HEAD). */
async function exists(url) {
  try {
    let r = await fetch(url, { method: 'HEAD' });
    if (r.ok) return true;
    if (r.status === 405 || r.status === 501) { r = await fetch(url); return r.ok; }
    return false;
  } catch (_) { return false; }
}

/* ─── DETECCIÓ DE DOCUMENTS (del curs actiu) ──────────────────────── */
async function discover() {
  const c = course();
  const docs = [];

  // Programació general (DOCX) del curs: el nom del fitxer el diu
  // manifest.json (camp "docx"), no cal que es digui res en concret.
  if (manifestDocx) {
    docs.push({
      id: 'prog', kind: 'docx', file: `${c.dir}/${manifestDocx}`,
      title: 'Programació general', sub: 'Curs · 6 unitats · avaluació',
    });
  }

  // Unitats Ud1…Ud6 que existeixin
  const checks = [];
  for (let i = 1; i <= UD_MAX; i++) {
    const file = `${c.dir}/Ud${i}.md`;
    checks.push(exists(file).then(ok => ok ? { n: i, file } : null));
  }
  const found = (await Promise.all(checks)).filter(Boolean).sort((a, b) => a.n - b.n);
  for (const u of found) {
    docs.push({
      id: 'ud' + u.n,
      kind: 'md',
      file: u.file,
      title: `Unitat ${u.n}`,
      sub: c.udTitles[u.n] || 'Unitat didàctica',
    });
  }
  return docs;
}

/* ─── RENDER: SIDEBAR ─────────────────────────────────────────────── */
function renderSidebar() {
  const prog = DOCS.filter(d => d.kind === 'docx');
  const uds  = DOCS.filter(d => d.kind === 'md');

  const navItem = d => {
    const isUd = d.kind === 'md';
    const icoCls = isUd ? 'ud' : 'prog';
    const icoTxt = isUd ? d.title.replace('Unitat ', 'U') : 'PD';
    return `<button class="nav-item${d.id === activeId ? ' active' : ''}" data-id="${d.id}">
      <span class="nav-ico ${icoCls}">${escHtml(icoTxt)}</span>
      <span class="nav-body">
        <span class="nav-title">${escHtml(d.title)}</span>
        <span class="nav-sub">${escHtml(d.sub)}</span>
      </span>
    </button>`;
  };

  let html = '';
  if (prog.length) {
    html += `<div class="side-group"><h3>Programació</h3>${prog.map(navItem).join('')}</div>`;
  }
  html += `<div class="side-group"><h3>Unitats didàctiques</h3>`;
  if (uds.length) {
    html += uds.map(navItem).join('');
  } else {
    html += `<div class="nav-empty">Encara no hi ha unitats. Deixa un fitxer <code>Ud1.md</code> a la carpeta de dades.</div>`;
  }
  html += `</div>`;

  const sb = document.getElementById('sidebar');
  sb.innerHTML = html;
  sb.querySelectorAll('.nav-item').forEach(btn =>
    btn.addEventListener('click', () => { select(btn.dataset.id); closeNav(); })
  );
}

/* ─── RENDER: MARKDOWN → HTML (parser lleuger) ───────────────────── */
/* Cobreix el que fan servir els documents Ud: encapçalaments, taules GFM,
   llistes, blockquotes, hr, negreta/cursiva/codi i enllaços. */
function mdToHtml(md) {
  md = md.replace(/\r\n?/g, '\n');
  const lines = md.split('\n');
  let out = [];
  let i = 0;

  const inline = t => escHtml(t)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  const splitRow = r => r.replace(/^\||\|$/g, '').split('|').map(c => c.trim());

  while (i < lines.length) {
    let line = lines[i];

    // línia buida
    if (/^\s*$/.test(line)) { i++; continue; }

    // hr
    if (/^\s*---+\s*$/.test(line)) { out.push('<hr>'); i++; continue; }

    // encapçalaments
    let h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { const l = h[1].length; out.push(`<h${l}>${inline(h[2].trim())}</h${l}>`); i++; continue; }

    // taula GFM: fila de capçalera + fila separadora |---|---|
    if (/^\s*\|.*\|\s*$/.test(line) && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')) {
      const header = splitRow(line);
      i += 2; // saltar capçalera + separador
      const rows = [];
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])) { rows.push(splitRow(lines[i])); i++; }
      let t = '<div class="table-scroll"><table><thead><tr>' +
        header.map(c => `<th>${inline(c)}</th>`).join('') + '</tr></thead><tbody>';
      for (const r of rows) {
        t += '<tr>' + header.map((_, c) => `<td>${inline(r[c] ?? '')}</td>`).join('') + '</tr>';
      }
      t += '</tbody></table></div>';
      out.push(t);
      continue;
    }

    // blockquote
    if (/^\s*>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^\s*>\s?/, '')); i++; }
      out.push('<blockquote>' + buf.map(b => `<p>${inline(b)}</p>`).join('') + '</blockquote>');
      continue;
    }

    // llista no ordenada
    if (/^\s*[-*+]\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) { buf.push(lines[i].replace(/^\s*[-*+]\s+/, '')); i++; }
      out.push('<ul>' + buf.map(b => `<li>${inline(b)}</li>`).join('') + '</ul>');
      continue;
    }

    // llista ordenada
    if (/^\s*\d+\.\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) { buf.push(lines[i].replace(/^\s*\d+\.\s+/, '')); i++; }
      out.push('<ol>' + buf.map(b => `<li>${inline(b)}</li>`).join('') + '</ol>');
      continue;
    }

    // paràgraf (acumula línies fins a un tall)
    const buf = [];
    while (i < lines.length && !/^\s*$/.test(lines[i]) &&
           !/^\s*(#{1,6}\s|>|[-*+]\s|\d+\.\s|---+\s*$)/.test(lines[i]) &&
           !/^\s*\|.*\|\s*$/.test(lines[i])) {
      buf.push(lines[i]); i++;
    }
    if (buf.length) out.push(`<p>${inline(buf.join(' '))}</p>`);
  }
  return out.join('\n');
}

/* ─── PROPOSTA A: format de fitxa per als camps de cada hora ──────────
   Transforma els paràgrafs «<strong>Camp:</strong> …» que generen les
   hores en una presentació més llegible, sense tocar el contingut:
   · Agrupament / Objectius/criteris / Correspon a / Materials → fitxa
     de metadades (graella de 2 columnes amb fons suau).
   · Desenvolupament detallat → bloc amb títol i filet blau.
   · Evidència… / Atenció a la diversitat → peu etiquetat amb separador.
   Opera sobre el HTML d'un bloc; deixa intacte el que no reconeix
   (Llegenda, Visió general, taules, etc.). */
function styleHourFields(html) {
  const FIELD = /^<p><strong>([^:]+):<\/strong>\s*([\s\S]*?)<\/p>$/;
  // Re-segmenta el cos per <p>…</p> i deixa la resta (taules, hr…) tal qual.
  const parts = html.split(/(<p>[\s\S]*?<\/p>)/g).filter(s => s !== '');

  const META = ['Agrupament', 'Objectius/criteris', 'Correspon a', 'Materials'];
  const FOOT = ['Evidència', 'Atenció a la diversitat'];

  function parseFieldP(str) {
    const m = str.match(FIELD);
    if (!m) return null;
    return { label: m[1].trim(), value: m[2].trim() };
  }
  // Una línia de metadades pot dur diversos camps units per « · »:
  // <strong>Agrupament:</strong> … · <strong>Objectius/criteris:</strong> …
  function splitInlineFields(value, firstLabel) {
    const rows = [];
    const re = /<strong>([^:]+):<\/strong>/g;
    // reconstrueix incloent el primer camp
    const full = `<strong>${firstLabel}:</strong> ${value}`;
    let m, idxs = [];
    while ((m = re.exec(full)) !== null) idxs.push({ label: m[1].trim(), start: m.index, after: re.lastIndex });
    for (let i = 0; i < idxs.length; i++) {
      const seg = full.slice(idxs[i].after, i + 1 < idxs.length ? idxs[i + 1].start : full.length);
      rows.push({ label: idxs[i].label, value: seg.replace(/^\s*|[\s·]+$/g, '').trim() });
    }
    return rows;
  }

  const out = [];
  // és un fragment només d'espais/salts (separador entre <p>)?
  const isBlank = s => /^\s*$/.test(s);
  // índex del següent fragment no-blanc a partir de j
  const nextReal = j => { while (j < parts.length && isBlank(parts[j])) j++; return j; };

  let i = 0;
  while (i < parts.length) {
    const seg = parts[i];
    if (isBlank(seg)) { out.push(seg); i++; continue; }
    const f = parseFieldP(seg);

    if (f && (META.includes(f.label) || f.label.startsWith('Objectius'))) {
      let rows = splitInlineFields(f.value, f.label);
      i++;
      // acumula camps META consecutius, saltant separadors en blanc
      for (;;) {
        const k = nextReal(i);
        const nf = k < parts.length ? parseFieldP(parts[k]) : null;
        if (nf && (META.includes(nf.label) || nf.label.startsWith('Objectius'))) {
          rows = rows.concat(splitInlineFields(nf.value, nf.label));
          i = k + 1;
        } else break;
      }
      out.push(
        '<div class="hour-card">' +
        rows.map(r =>
          `<div class="hc-key">${escHtml(r.label)}</div><div class="hc-val">${r.value}</div>`
        ).join('') +
        '</div>'
      );
      continue;
    }

    if (f && f.label.startsWith('Desenvolupament')) {
      out.push(
        '<div class="hour-devel"><div class="hd-title">' +
        `<span class="hd-bar"></span>${escHtml(f.label)}</div>` +
        `<div class="hd-body"><p>${f.value}</p></div></div>`
      );
      i++;
      continue;
    }

    if (f && FOOT.some(lbl => f.label.startsWith(lbl))) {
      // agrupa els camps de peu consecutius en un sol bloc amb separador
      const foot = [];
      let k = i;
      for (;;) {
        k = nextReal(k);
        const nf = k < parts.length ? parseFieldP(parts[k]) : null;
        if (nf && FOOT.some(lbl => nf.label.startsWith(lbl))) { foot.push(nf); k++; }
        else break;
      }
      i = k;
      out.push(
        '<div class="hour-foot">' +
        foot.map(r => `<p><span class="hf-key">${escHtml(r.label)}:</span> ${r.value}</p>`).join('') +
        '</div>'
      );
      continue;
    }

    out.push(seg);
    i++;
  }
  return out.join('');
}


/* ─── PLEGABLE: blocs principals (H1/H2) amb subplegables niats (H3) ──
   · Bloc arrel: arrenca al títol del document (<h1>) i engloba el
     subtítol; a dins, «Llegenda» i «Visió general» (<h3>) són
     subplegables niats.
   · Blocs germans: cada <h2> (les 16 hores, relació amb l'avaluació,
     observacions). Si contenen <h3>, també esdevenen subplegables.
   Tot tancat per defecte. */
function wrapDetails(title, body, cls) {
  return `<details class="sec${cls ? ' ' + cls : ''}"><summary>` +
           `<span class="sec-caret" aria-hidden="true"></span>` +
           `<span class="sec-title">${title}</span>` +
         `</summary><div class="sec-body">${body}</div></details>`;
}

/* Converteix els <h3> de dins d'un bloc en subplegables niats.
   El contingut anterior al primer <h3> es manté visible a dalt del bloc. */
function nestH3(body) {
  const segs = body.split(/(?=<h3>)/g);
  let out = '';
  for (const seg of segs) {
    const m = seg.match(/^<h3>([\s\S]*?)<\/h3>([\s\S]*)$/);
    if (!m) { out += seg; continue; }          // intro abans del primer h3
    out += wrapDetails(m[1], m[2], 'sub');
  }
  return out;
}

function collapsibleByH2(html, udNum) {
  const parts = html.split(/(?=<h1>|<h2>)/g).filter(p => p.trim() !== '');
  // Si el document arrenca amb <h1> seguit d'un <h2> de subtítol,
  // fusiona tots dos en un únic bloc arrel (el subtítol no és un node propi).
  if (parts.length >= 2 && /^<h1>/.test(parts[0]) && /^<h2>/.test(parts[1])) {
    const sub = parts[1].replace(/^<h2>([\s\S]*?)<\/h2>/, '<p class="sec-subtitle">$1</p>');
    parts[0] = parts[0] + sub;
    parts.splice(1, 1);
  }
  let out = '';
  for (const part of parts) {
    const m = part.match(/^<(h1|h2)>([\s\S]*?)<\/\1>([\s\S]*)$/);
    if (!m) { out += part; continue; }
    const title = m[2];
    let body = styleHourFields(nestH3(m[3]));
    // Si el bloc és una sessió («Sessió N — …») i sabem la unitat, hi afegim
    // el panell del PDF corresponent (1bat-ud{udNum}-{N}.pdf), amagat fins
    // que es comprovi que el fitxer existeix.
    const sm = udNum && title.match(/Sessió\s+(\d+)/i);
    if (sm) {
      body = pdfPanel(udNum, parseInt(sm[1], 10)) + body;
    }
    out += wrapDetails(title, body, '');
  }
  return out;
}

/* Panell de material (PDF) d'una sessió. L'estat es decideix en el moment
   del render, consultant pdfManifest (carregat a loadCourse() des de
   {dir}/manifest.json — la llista dels PDF que realment existeixen). No es fa
   cap petició de xarxa per sessió ni cap canvi d'estat posterior:
   - Si el nom hi és al manifest: botó blau "Veure PDF".
   - Si no hi és: insígnia grisa "PDF en construcció", no clicable. */
function pdfPanel(udNum, sessNum) {
  const c = course();
  const filename = `${c.pdfPrefix}-ud${udNum}-${sessNum}.pdf`;
  const file = `${c.dir}/${filename}`;
  const exists = pdfManifest.has(filename);
  const viewSvg = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>';
  const wipSvg = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2 1.5"/></svg>';
  return `<div class="session-pdf${exists ? '' : ' sp-pending'}" data-pdf="${escHtml(file)}">` +
           `<span class="sp-label"><span class="sp-ico">PDF</span>Material de la sessi\u00f3</span>` +
           `<a class="sp-btn sp-view" href="${escHtml(file)}" target="_blank" rel="noopener"${exists ? '' : ' hidden'}>${viewSvg} Veure PDF</a>` +
           `<span class="sp-wip"${exists ? ' hidden' : ''}>${wipSvg} PDF en construcci\u00f3</span>` +
         `</div>`;
}

/* ─── RENDER: DOCX → HTML (mammoth) ───────────────────────────────── */
async function renderDocx(doc) {
  const resp = await fetch(doc.file);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const buf = await resp.arrayBuffer();
  const styleMap = [
    "p[style-name='Title'] => h1:fresh",
    "p[style-name='Heading 1'] => h2:fresh",
    "p[style-name='Heading 2'] => h3:fresh",
    "p[style-name='Heading 3'] => h4:fresh",
  ];
  const res = await mammoth.convertToHtml({ arrayBuffer: buf }, { styleMap });
  return res.value;
}

/* ─── SELECCIÓ I PINTAT ───────────────────────────────────────────── */
async function select(id) {
  activeId = id;
  renderSidebar();
  const doc = DOCS.find(d => d.id === id);
  const main = document.getElementById('main');
  window.scrollTo(0, 0);
  if (!doc) return;

  const isUd = doc.kind === 'md';
  const headHtml = `
    <div class="doc-head">
      <span class="dh-ico ${isUd ? 'ud' : 'prog'}">${isUd ? doc.title.replace('Unitat ', 'U') : 'PD'}</span>
      <div>
        <h1>${escHtml(isUd ? doc.title + ' — ' + doc.sub : 'Programació didàctica')}</h1>
        <div class="dh-meta">${isUd ? 'Proposta detallada d\u2019activitats · Markdown' : 'Matemàtiques Aplicades I · document Word'}</div>
      </div>
      ${isUd ? `<div class="dh-actions">
        <button class="pill-btn" id="toggleAll" data-state="collapsed">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg>
          Desplega-ho tot
        </button>
      </div>` : ''}
    </div>`;

  if (cache[id]) {
    main.innerHTML = `<div class="doc-wrap">${headHtml}<div class="rich">${cache[id]}</div></div>`;
    wireToggleAll();
    return;
  }

  main.innerHTML = `<div class="doc-wrap">${headHtml}<div class="state"><div class="spinner"></div><div>Carregant el document…</div></div></div>`;

  try {
    let inner;
    if (doc.kind === 'docx') {
      inner = await renderDocx(doc);
    } else {
      const r = await fetch(doc.file);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const udMatch = (doc.id || '').match(/ud(\d+)/i);
      const udNum = udMatch ? parseInt(udMatch[1], 10) : null;
      inner = collapsibleByH2(mdToHtml(await r.text()), udNum);
    }
    cache[id] = inner;
    if (activeId === id) {
      main.innerHTML = `<div class="doc-wrap">${headHtml}<div class="rich">${inner}</div></div>`;
      wireToggleAll();
    }
  } catch (err) {
    main.innerHTML = `<div class="doc-wrap">${headHtml}
      <div class="state err"><div class="state-box">
        <strong>No s\u2019ha pogut carregar el document.</strong><br>
        Comprova que el fitxer <code>${escHtml(doc.file)}</code> existeix i que la pàgina
        s\u2019està servint per HTTP (no amb <code>file://</code>).<br>
        <span style="color:var(--hint)">Detall: ${escHtml(err.message)}</span>
      </div></div></div>`;
  }
}

/* ─── Control «Desplega-ho tot / Plega-ho tot» ────────────────────── */
function wireToggleAll() {
  const btn = document.getElementById('toggleAll');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const secs = document.querySelectorAll('.rich .sec');
    const expand = btn.dataset.state === 'collapsed';
    secs.forEach(d => d.open = expand);
    btn.dataset.state = expand ? 'expanded' : 'collapsed';
    btn.querySelector('svg').style.transform = expand ? 'rotate(180deg)' : '';
    btn.childNodes[btn.childNodes.length - 1].textContent =
      expand ? ' Plega-ho tot' : ' Desplega-ho tot';
  });
}

/* ─── Contingut del curs: quins fitxers existeixen ─────────────────────
   En lloc de fer petites peticions de xarxa per endevinar quins fitxers
   hi ha (fràgil: cau del navegador, peculiaritats del servidor estàtic,
   condicions de carrera...), llegim un cop per curs {dir}/manifest.json:
     { "docx": "nom-del-fitxer.docx", "pdfs": ["1bat-ud2-1.pdf", ...] }
   "docx" pot ser qualsevol nom (o null si encara no hi ha programació
   general); discover() i pdfPanel() consulten aquestes dades de manera
   síncrona en pintar, així que l'estat ja surt correcte al primer render. */
let pdfManifest = new Set();
let manifestDocx = null;
async function loadManifest() {
  const c = course();
  try {
    const r = await fetch(`${c.dir}/manifest.json`, { cache: 'no-store' });
    const data = r.ok ? await r.json() : {};
    pdfManifest = new Set(Array.isArray(data.pdfs) ? data.pdfs : []);
    manifestDocx = typeof data.docx === 'string' && data.docx ? data.docx : null;
  } catch (_) {
    pdfManifest = new Set();
    manifestDocx = null;
  }
}

/* ─── NAV mòbil ───────────────────────────────────────────────────── */
function closeNav() { document.getElementById('app').classList.remove('nav-open'); }
document.getElementById('menuToggle').addEventListener('click', () =>
  document.getElementById('app').classList.toggle('nav-open'));
document.getElementById('scrim').addEventListener('click', closeNav);

/* ─── IMPRESSIÓ: desplega tots els blocs i els restaura després ────── */
let _printReopen = [];
window.addEventListener('beforeprint', () => {
  _printReopen = [...document.querySelectorAll('.rich .sec:not([open])')];
  _printReopen.forEach(d => d.open = true);
});
window.addEventListener('afterprint', () => {
  _printReopen.forEach(d => d.open = false);
  _printReopen = [];
});

/* ─── CURS: pintar marca, botons i carregar documents del curs actiu ── */
function renderBrand() {
  const c = course();
  document.getElementById('brand').innerHTML =
    `${escHtml(c.brand)} <small>${escHtml(c.brandSub)}</small>`;
}
function renderCourseButtons() {
  document.querySelectorAll('.course-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.course === currentCourse);
  });
}

async function loadCourse() {
  renderBrand();
  renderCourseButtons();
  // reinicialitza estat de documents en canviar de curs
  for (const k in cache) delete cache[k];
  activeId = null;
  document.getElementById('main').innerHTML =
    '<div class="state"><div class="spinner"></div><div>Carregant…</div></div>';
  await loadManifest();
  DOCS = await discover();
  renderSidebar();
  if (DOCS.length) {
    select(DOCS[0].id);
  } else {
    const c = course();
    document.getElementById('main').innerHTML =
      `<div class="state err"><div class="state-box">
        <strong>Encara no hi ha material per al ${escHtml(c.label)}.</strong><br>
        Col\u00b7loca el DOCX i els fitxers <code>Ud1.md</code>\u2026<code>Ud6.md</code> dins de
        <code>${escHtml(c.dir)}/</code> i serveix la pàgina per HTTP.
      </div></div>`;
  }
}

function setCourse(courseId) {
  if (!COURSES[courseId] || courseId === currentCourse) return;
  currentCourse = courseId;
  closeNav();
  loadCourse();
}

document.querySelectorAll('.course-btn').forEach(btn =>
  btn.addEventListener('click', () => setCourse(btn.dataset.course)));

/* ─── INIT ────────────────────────────────────────────────────────── */
loadCourse();
</script>
</body>
</html>
