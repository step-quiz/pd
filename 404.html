<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pàgina no trobada — Programació Didàctica</title>
<link rel="stylesheet" href="assets/css/tokens.css">
<style>
  body { min-height: 100dvh; display: flex; align-items: center; justify-content: center;
         background: var(--bg); font-family: "Segoe UI", system-ui, sans-serif; }
  .wrap { text-align: center; padding: 40px 20px; }
  .code { font-size: 64px; font-weight: 800; color: var(--line); line-height: 1; margin-bottom: 16px; }
  h1 { font-size: 22px; color: var(--navy); margin-bottom: 8px; }
  p { color: var(--muted); margin-bottom: 24px; }
  a { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px;
      border-radius: 20px; background: var(--blue); color: #fff;
      font-weight: 600; text-decoration: none; font-size: 15px; }
  a:hover { background: var(--navy); }
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Pàgina no trobada</h1>
  <p>Aquesta adreça no existeix.</p>
  <a href="/">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="14" height="14"><path d="M10 4l-5 4 5 4"/></svg>
    Tornar a l'inici
  </a>
</div>
</body>
</html>
